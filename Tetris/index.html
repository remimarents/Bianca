<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biancas Tetris</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-shell">
    <div id="top-controls">
      <button id="sound-btn" type="button">Lyd: på</button>
      <button id="music-btn" type="button">Musikk: på</button>
      <button id="exit-btn" type="button">Avslutt</button>
    </div>

    <canvas id="tetris" width="920" height="760"></canvas>
  </div>

  <script type="module" src="tetris.js"></script>
  <script>
    document.getElementById('exit-btn').onclick = function() {
      window.location.href = '../index.html';
    };
  </script>
</body>
</html>
